# Path2 + ExposureDiffusion-style refinement — T4-friendly (batch 1, 2 refine steps).
# python see/main.py --yaml_file=options/SEE/SEENet_SEE_path2_colab_t4.yaml --TRAIN_BATCH_SIZE=1 ...

JOBS: 4
TEST_ONLY: false
LOG_INTERVAL: 10
TRAIN_BATCH_SIZE: 1
VAL_BATCH_SIZE: 1
START_EPOCH: 0
END_EPOCH: 20
VAL_INTERVAL: 1
MODEL_SANING_INTERVAL: 1
MIX_PRECISION: true
RESUME:
  PATH: null
  TYPE: null
  SET_EPOCH: true
LAUNCHER: ParallelLaunch
SEED: 9527
IS_CUDA: true
OPTIMIZER:
  NAME: Adam
  LR: 0.0001
  LR_SCHEDULER: cosine
  end_epoch: 20
LOSS:
  - NAME: iterative_refinement_loss
    WEIGHT: 1
    refine_steps: 2
    adaptive_loss: false
    aux_loss: true
    aux_weight: 0.25
    step_weight_schedule: increasing
  - NAME: gradient_loss
    WEIGHT: 0.5
METRICS:
  - NAME: PSNR
  - NAME: PSNR-Linear_N
  - NAME: SSIM
DATASET:
  NAME: see_everything_everytime_dataset
  root: ./SEE-600K/RoboticArm/
  train_scenario_filter: indoor
  val_scenario_filter: indoor
  in_frames: 1
  crop_h: 128
  crop_w: 256
  sample_step: 50
  event_representation_config:
    type: voxel_grid
    channel: 64
    scale: 5
    to_bin: true
  testing_mapping_type:
    - "high-normal"
    - "normal-normal"
    - "low-normal"
  training_mapping_type:
    - "high-normal"
    - "low-normal"
    - "normal-normal"
MODEL:
  NAME: SEENetPath2
  input_frames: 1
  event_moments: 64
  C1: 96
  C2: 96
  loop: 10
  SEE_config:
    position_embedding: "bayer_pattern"
    w_xy_coords: true
    position_embedding_type: "learning:1x1+1x1"
    head: "original:image1x1-event1x1sigmod1x1"
    sparse_encoder_config:
      type: "swin_transformer_decoder_block"
      depth: 4
      heads: 8
      windows_size: 4
    refine_steps: 2
    concat_origin: true
    adaptive_res_and_x0: true
    start_from_ll: true
    use_init_head: true
    supervise_intermediate: true
VISUALIZATION:
  folder: ./vis
  tag: SEENetPath2-ED-colab
  intermediate_visualization: false
  ONLY_VIS: false
